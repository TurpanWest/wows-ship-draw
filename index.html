<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Random ship picker for World of Warships. Draw a random ship from your fleet, filter by ship type, and track your draw history. Supports DD, CA, BB, CV, SS classes." />
        <meta name="keywords" content="World of Warships, WoWS, ship randomizer, ship picker, fleet manager, warship game" />
        <meta name="google-site-verification" content="85V-Px1OmtOMTkZcY5P1sU_kFruZ48SRq-Dby9q3Ugc" />
        
        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://wows-ship-draw.vercel.app/" />
        <meta property="og:title" content="Ship Drawer · Fleet Manifest" />
        <meta property="og:description" content="Random ship picker for World of Warships. Draw a random ship from your fleet, filter by ship type, and track your draw history." />
        <meta property="og:locale" content="en_US" />
        <meta property="og:locale:alternate" content="zh_CN" />
        
        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Ship Drawer · Fleet Manifest" />
        <meta name="twitter:description" content="Random ship picker for World of Warships. Draw a random ship from your fleet." />
        
        <!-- Canonical URL -->
        <link rel="canonical" href="https://wows-ship-draw.vercel.app/" />
        
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link rel="stylesheet" href="style.css" />
        <title>Ship Drawer · Fleet Manifest</title>
        <script>
            try {
                if (localStorage.getItem("theme") === "dark") {
                    document.documentElement.dataset.theme = "dark";
                }
            } catch (e) {}
        </script>
    </head>
    <body>
        <nav class="top-controls" aria-label="Settings">
            <button
                class="theme-toggle"
                id="theme-toggle"
                onclick="toggleTheme()"
                aria-label="Toggle dark mode"
                title="Toggle dark mode"
            >
                <span id="theme-icon">☾</span>
            </button>
            <div class="language-switcher" role="group" aria-label="Language selection">
                <button
                    class="lang-btn"
                    onclick="switchLanguage('en')"
                    id="lang-en"
                    aria-label="Switch to English"
                >
                    EN
                </button>
                <button
                    class="lang-btn"
                    onclick="switchLanguage('zh')"
                    id="lang-zh"
                    aria-label="切换到中文"
                >
                    中文
                </button>
            </div>
        </nav>

        <main class="sheet">
            <header class="sheet__head">
                <h1 id="title" class="sheet__title">Ship Drawer</h1>
                <div class="sheet__rule"></div>
            </header>

            <section id="filters">
                <span class="section-label" id="filters-label">FILTERS</span>
                <label
                    ><input type="checkbox" id="excludeCV" /><span
                        id="exclude-cv-text"
                        >Exclude CV</span
                    ></label
                >
                <label
                    ><input type="checkbox" id="excludeSS" /><span
                        id="exclude-ss-text"
                        >Exclude SS</span
                    ></label
                >
                <label
                    ><input type="checkbox" id="onlyPremium" /><span
                        id="only-premium-text"
                        >Only Premium</span
                    ></label
                >
            </section>

            <section id="tier-filter">
                <span class="section-label" id="tier-label">TIER</span>
                <div id="tier-checkboxes" class="tier-checkboxes"></div>
            </section>

            <section id="nation-filter">
                <div class="section-head">
                    <span class="section-label" id="nation-label">NATION</span>
                    <span class="nation-actions">
                        <button
                            type="button"
                            class="nation-action"
                            id="nation-all"
                        >
                            ALL
                        </button>
                        <button
                            type="button"
                            class="nation-action"
                            id="nation-none"
                        >
                            NONE
                        </button>
                    </span>
                </div>
                <div id="nation-chips" class="chip-group"></div>
            </section>

            <section id="mode">
                <span class="section-label" id="mode-label">MODE</span>
                <div class="mode-group">
                    <button
                        class="mode-btn active"
                        id="goal-any"
                        onclick="setGoal(null)"
                    >
                        ALL
                    </button>
                    <button
                        class="mode-btn"
                        id="goal-winning"
                        onclick="setGoal('winning')"
                    >
                        WIN
                    </button>
                    <button
                        class="mode-btn"
                        id="goal-easy"
                        onclick="setGoal('easy')"
                    >
                        OP
                    </button>
                    <button
                        class="mode-btn"
                        id="goal-fun"
                        onclick="setGoal('fun')"
                    >
                        FUN
                    </button>
                    <button
                        class="mode-btn"
                        id="goal-trash"
                        onclick="setGoal('trash')"
                    >
                        TRASH
                    </button>
                </div>
            </section>

            <section class="roster">
                <div class="section-head">
                    <span class="section-label" id="roster-label">FLEET</span>
                    <span class="section-meta" id="roster-count">0 SHIPS</span>
                </div>
                <div id="ship-list"></div>
            </section>

            <button class="draw-btn" onclick="drawShip()" id="draw-btn">
                Draw a Ship
            </button>

            <div id="result"></div>

            <section class="history" id="history" hidden>
                <div class="section-head">
                    <span class="section-label" id="history-label">HISTORY</span>
                    <span class="section-meta" id="history-count">0 / 5</span>
                </div>
                <ol id="history-list"></ol>
            </section>

            <section class="add">
                <span class="section-label" id="add-label">ADD TO FLEET</span>
                <div class="input-row">
                    <input
                        type="text"
                        id="newShipName"
                        placeholder="Ship Name"
                    />
                    <div class="input-controls">
                        <select id="newShipType">
                            <option value="DD">DD</option>
                            <option value="CA">CA</option>
                            <option value="BB">BB</option>
                            <option value="CV">CV</option>
                            <option value="SS">SS</option>
                        </select>
                        <select id="newShipTier">
                            <option value="8">VIII</option>
                            <option value="9">IX</option>
                            <option value="10" selected>X</option>
                            <option value="11">XI</option>
                        </select>
                        <select id="newShipNation"></select>
                        <button
                            class="add-btn"
                            onclick="addShip()"
                            id="add-btn"
                        >
                            Add
                        </button>
                        <button
                            class="reset-btn"
                            onclick="resetToDefault()"
                            id="reset-btn"
                        >
                            Reset
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <script type="module" src="main.js"></script>
    </body>
</html>
